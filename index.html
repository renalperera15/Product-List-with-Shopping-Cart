<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-container">
        <h1>Simple Store</h1>
        <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
    </div>
</header>

<main>
<div class="container">

<h2>Products</h2>

<div class="products">

<div class="card">
<h3>Product 1</h3>
<p>$10</p>
<button onclick="addToCart('Product 1',10)">Add to Cart</button>
</div>

<div class="card">
<h3>Product 2</h3>
<p>$20</p>
<button onclick="addToCart('Product 2',20)">Add to Cart</button>
</div>

<div class="card">
<h3>Product 3</h3>
<p>$15</p>
<button onclick="addToCart('Product 3',15)">Add to Cart</button>
</div>

</div>
</div>
</main>

<script src="js/script.js"></script>
</body>
</html>
